<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a1628">
<title>Admin | Core System</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a1628;--surface:#0f1d32;--card:#141f35;--border:#1a2d4a;--border2:#243555;--accent:#5a7cf7;--accent2:#8c4afd;--success:#12d18e;--danger:#e53e3e;--text:#ffffff;--muted:#a0a0c0;--light:#c0c0d0}
html{overflow-x:hidden;background:var(--bg)}
body{font-family:'IBM Plex Sans Arabic',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:16px;line-height:1.7;-webkit-font-smoothing:antialiased;overflow-x:hidden}

/* Login */
#login-screen{display:flex;flex-direction:column;justify-content:center;align-items:center;min-height:100vh;padding:24px}
.login-box{width:100%;max-width:360px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px 24px}
.login-logo{text-align:center;margin-bottom:32px}
.login-logo span{font-family:'IBM Plex Mono',monospace;letter-spacing:4px;font-size:14px;font-weight:700;color:var(--light)}
.login-logo span em{color:var(--accent);font-style:normal}
.login-title{font-size:22px;font-weight:700;text-align:center;margin-bottom:8px}
.login-sub{font-size:14px;color:var(--muted);text-align:center;margin-bottom:28px}
.login-input{width:100%;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:inherit;font-size:16px;margin-bottom:16px;text-align:center;letter-spacing:2px}
.login-input:focus{outline:none;border-color:var(--accent)}
.login-btn{width:100%;padding:14px;background:var(--accent);color:var(--white);border:none;border-radius:10px;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;transition:opacity .2s}
.login-btn:active{opacity:.85}
.login-error{color:var(--danger);font-size:13px;text-align:center;margin-top:12px;display:none}

/* Dashboard */
#dashboard{display:none;min-height:100vh}
.admin-header{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);padding:16px 20px;display:flex;justify-content:space-between;align-items:center}
.admin-header h1{font-size:16px;font-weight:700;font-family:'IBM Plex Mono',monospace;letter-spacing:2px}
.admin-header h1 em{color:var(--accent);font-style:normal}
.logout-btn{background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:8px;padding:8px 16px;font-size:12px;font-family:inherit;cursor:pointer}

/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:16px 20px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center}
.stat-num{font-size:32px;font-weight:700;font-family:'IBM Plex Mono',monospace;color:var(--accent);line-height:1}
.stat-label{font-size:11px;color:var(--muted);margin-top:6px;font-weight:500}

/* Tabs */
.tabs{display:flex;gap:8px;padding:0 20px 16px;border-bottom:1px solid var(--border)}
.tab{flex:1;padding:12px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--muted);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;text-align:center;transition:all .2s}
.tab.active{background:var(--accent);color:var(--white);border-color:var(--accent)}

/* Content */
.tab-content{display:none;padding:16px 20px 80px}
.tab-content.active{display:block}

/* Search */
.search-box{width:100%;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:inherit;font-size:15px;margin-bottom:16px}
.search-box:focus{outline:none;border-color:var(--accent)}
.search-box::placeholder{color:var(--muted)}

/* Cards */
.data-cards{display:grid;gap:10px}
.data-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px}
.data-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.data-card-name{font-size:16px;font-weight:700}
.data-card-date{font-size:11px;color:var(--muted);font-family:'IBM Plex Mono',monospace}
.data-card-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:8px}
.data-card-tag{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:12px;color:var(--light)}
.data-card-phone{direction:ltr;text-align:left;font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--accent);margin-top:4px}
.data-card-email{font-size:13px;color:var(--muted);margin-top:4px}

/* Score badge */
.score-badge{display:inline-block;padding:4px 14px;border-radius:6px;font-size:14px;font-weight:700;font-family:'IBM Plex Mono',monospace}
.score-high{background:rgba(16,185,129,.15);color:#10b981;border:1px solid rgba(16,185,129,.3)}
.score-mid{background:rgba(90,124,247,.15);color:#5a7cf7;border:1px solid rgba(90,124,247,.3)}
.score-low{background:rgba(240,144,10,.15);color:#f0900a;border:1px solid rgba(240,144,10,.3)}
.score-bad{background:rgba(229,62,62,.15);color:#e53e3e;border:1px solid rgba(229,62,62,.3)}

/* Answers grid */
.answers-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:10px}
.answer-cell{background:var(--surface);border-radius:6px;padding:6px;text-align:center;font-size:11px}
.answer-cell .ans-val{font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:13px;color:var(--accent)}
.answer-cell .ans-lbl{color:var(--muted);font-size:10px;margin-top:2px}

/* Empty state */
.empty-state{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-state svg{width:48px;height:48px;margin-bottom:16px;opacity:.5}

/* Loading */
.loading{text-align:center;padding:40px;color:var(--muted);font-size:14px}

/* Export btn */
.export-btn{position:fixed;bottom:20px;left:20px;right:20px;max-width:400px;margin:0 auto;padding:14px;background:var(--accent);color:var(--white);border:none;border-radius:12px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;z-index:50;box-shadow:0 4px 20px rgba(90,124,247,.3)}
.export-btn:active{opacity:.9}

@media(min-width:640px){
  .stats-grid{grid-template-columns:repeat(4,1fr)}
  .data-cards{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo"><span>CORE <em>ADMIN</em></span></div>
    <h2 class="login-title">لوحة الإدارة</h2>
    <p class="login-sub">أدخل كلمة السر للوصول إلى البيانات</p>
    <input type="password" class="login-input" id="admin-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">دخول</button>
    <div class="login-error" id="login-error">كلمة السر غير صحيحة</div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="admin-header">
    <h1>CORE <em>ADMIN</em></h1>
    <button class="logout-btn" onclick="doLogout()">خروج</button>
  </div>

  <div class="stats-grid" id="stats-grid">
    <div class="stat-card"><div class="stat-num" id="stat-leads">--</div><div class="stat-label">العملاء</div></div>
    <div class="stat-card"><div class="stat-num" id="stat-assess">--</div><div class="stat-label">التقييمات</div></div>
    <div class="stat-card"><div class="stat-num" id="stat-avg">--</div><div class="stat-label">متوسط النتيجة</div></div>
    <div class="stat-card"><div class="stat-num" id="stat-today">--</div><div class="stat-label">اليوم</div></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('leads')" id="tab-leads">العملاء</button>
    <button class="tab" onclick="switchTab('assessments')" id="tab-assessments">التقييمات</button>
  </div>

  <div class="tab-content active" id="content-leads">
    <input type="text" class="search-box" id="search-leads" placeholder="بحث بالاسم أو الرقم أو الإيميل..." oninput="filterLeads(this.value)">
    <div class="loading" id="loading-leads">جاري التحميل...</div>
    <div class="data-cards" id="cards-leads"></div>
  </div>

  <div class="tab-content" id="content-assessments">
    <input type="text" class="search-box" id="search-assess" placeholder="بحث بالاسم أو النتيجة..." oninput="filterAssess(this.value)">
    <div class="loading" id="loading-assess">جاري التحميل...</div>
    <div class="data-cards" id="cards-assess"></div>
  </div>

  <button class="export-btn" onclick="exportCurrent()">📥 تصدير CSV</button>
</div>

<script>
// ═══════════════════════════════════════
// CONFIG — نفس المشروع
// ═══════════════════════════════════════
const CFG = {
  supabase_url: 'https://oaqpzaarppcchnepffxx.supabase.co',
  supabase_key: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9hcXB6YWFycHBjY2JuZXBmZnh4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MTQ5NTMsImV4cCI6MjA5NjA5MDk1M30.quCL_HfvUiLYKkp5yTipdafPQ3ktRZNgDD1XDd4PHfA',
  admin_password: 'CoreAdmin2026!'  // غيّرها لاحقاً
};

// ═══════════════════════════════════════
// SUPABASE
// ═══════════════════════════════════════
let supabaseClient = null;
try {
  var supabaseLib = window.supabase || supabase;
  supabaseClient = supabaseLib.createClient(CFG.supabase_url, CFG.supabase_key);
  console.log('[ADMIN] ✅ Supabase connected');
} catch(e) {
  console.error('[ADMIN] ❌ Supabase failed:', e);
}

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
var allLeads = [];
var allAssessments = [];
var currentTab = 'leads';

// ═══════════════════════════════════════
// LOGIN
// ═══════════════════════════════════════
function doLogin() {
  var pass = document.getElementById('admin-pass').value;
  if (pass === CFG.admin_password) {
    localStorage.setItem('core_admin_auth', '1');
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadData();
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
}

function doLogout() {
  localStorage.removeItem('core_admin_auth');
  location.reload();
}

// Auto-login if previously authenticated
if (localStorage.getItem('core_admin_auth') === '1') {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  loadData();
}

// ═══════════════════════════════════════
// DATA LOADING
// ═══════════════════════════════════════
async function loadData() {
  if (!supabaseClient) {
    alert('خطأ في الاتصال بـ Supabase');
    return;
  }

  // Load leads
  try {
    var { data: leads, error: e1 } = await supabaseClient.from('leads').select('*').order('created_at', {ascending: false});
    if (e1) throw e1;
    allLeads = leads || [];
    renderLeads(allLeads);
    document.getElementById('loading-leads').style.display = 'none';
  } catch(e) {
    console.error('[ADMIN] Leads error:', e);
    document.getElementById('loading-leads').textContent = 'خطأ في تحميل البيانات';
  }

  // Load assessments
  try {
    var { data: assess, error: e2 } = await supabaseClient.from('assessments').select('*').order('created_at', {ascending: false});
    if (e2) throw e2;
    allAssessments = assess || [];
    renderAssessments(allAssessments);
    document.getElementById('loading-assess').style.display = 'none';
  } catch(e) {
    console.error('[ADMIN] Assess error:', e);
    document.getElementById('loading-assess').textContent = 'خطأ في تحميل البيانات';
  }

  updateStats();
}

// ═══════════════════════════════════════
// RENDER LEADS
// ═══════════════════════════════════════
function renderLeads(list) {
  var container = document.getElementById('cards-leads');
  if (!list.length) {
    container.innerHTML = '<div class="empty-state">لا توجد بيانات</div>';
    return;
  }

  var html = '';
  list.forEach(function(row) {
    var date = new Date(row.created_at).toLocaleDateString('ar-JO', {day:'numeric', month:'short', hour:'2-digit', minute:'2-digit'});
    var spec = {cosmetic:'تجميل',dental:'أسنان',general:'عام',derma:'جلدية',ortho:'عظام',eye:'عيون',other:'آخر'}[row.specialty] || row.specialty || '-';
    var yr = {1:'< سنة',2:'1-3 سنوات',3:'3-7 سنوات',4:'> 7 سنوات'}[row.years] || row.years || '-';
    var st = {1:'1-3',2:'4-8',3:'9-15',4:'>15'}[row.staff] || row.staff || '-';

    html += '<div class="data-card">';
    html += '<div class="data-card-header"><div class="data-card-name">' + (row.name || '—') + '</div><div class="data-card-date">' + date + '</div></div>';
    html += '<div class="data-card-row">';
    html += '<span class="data-card-tag">' + spec + '</span>';
    html += '<span class="data-card-tag">' + yr + '</span>';
    html += '<span class="data-card-tag">' + st + ' أفراد</span>';
    html += '</div>';
    html += '<div class="data-card-phone">📱 ' + (row.phone || '—') + '</div>';
    html += '<div class="data-card-email">✉️ ' + (row.email || '—') + '</div>';
    html += '</div>';
  });
  container.innerHTML = html;
}

// ═══════════════════════════════════════
// RENDER ASSESSMENTS
// ═══════════════════════════════════════
function renderAssessments(list) {
  var container = document.getElementById('cards-assess');
  if (!list.length) {
    container.innerHTML = '<div class="empty-state">لا توجد تقييمات</div>';
    return;
  }

  var html = '';
  list.forEach(function(row) {
    var date = new Date(row.created_at).toLocaleDateString('ar-JO', {day:'numeric', month:'short', hour:'2-digit', minute:'2-digit'});
    var score = row.final || 0;
    var scoreClass = score >= 80 ? 'score-high' : score >= 65 ? 'score-mid' : score >= 45 ? 'score-low' : 'score-bad';
    var spec = {cosmetic:'تجميل',dental:'أسنان',general:'عام',derma:'جلدية',ortho:'عظام',eye:'عيون',other:'آخر'}[row.specialty] || row.specialty || '-';

    html += '<div class="data-card">';
    html += '<div class="data-card-header">';
    html += '<div><div class="data-card-name">' + (row.name || '—') + '</div><div style="font-size:12px;color:var(--muted);margin-top:4px">' + spec + '</div></div>';
    html += '<div class="score-badge ' + scoreClass + '">' + score + '/100</div>';
    html += '</div>';
    html += '<div class="data-card-date" style="margin-bottom:10px">' + date + '</div>';
    html += '<div class="answers-grid">';
    html += '<div class="answer-cell"><div class="ans-val">' + (row.operational || 0) + '</div><div class="ans-lbl">العمليات</div></div>';
    html += '<div class="answer-cell"><div class="ans-val">' + (row.commercial || 0) + '</div><div class="ans-lbl">التواصل</div></div>';
    html += '<div class="answer-cell"><div class="ans-val">' + (row.retention || 0) + '</div><div class="ans-lbl">الولاء</div></div>';
    html += '</div>';
    html += '<div class="data-card-row" style="margin-top:10px">';
    html += '<span class="data-card-tag">Q1: ' + (row.q1 || '-') + '</span>';
    html += '<span class="data-card-tag">Q2: ' + (row.q2 || '-') + '</span>';
    html += '<span class="data-card-tag">Q3: ' + (row.q3 || '-') + '</span>';
    html += '<span class="data-card-tag">Q4: ' + (row.q4 || '-') + '</span>';
    html += '<span class="data-card-tag">Q5: ' + (row.q5 || '-') + '</span>';
    html += '<span class="data-card-tag">Q6: ' + (row.q6 || '-') + '</span>';
    html += '</div>';
    html += '</div>';
  });
  container.innerHTML = html;
}

// ═══════════════════════════════════════
// STATS
// ═══════════════════════════════════════
function updateStats() {
  document.getElementById('stat-leads').textContent = allLeads.length;
  document.getElementById('stat-assess').textContent = allAssessments.length;

  var avg = allAssessments.length ? Math.round(allAssessments.reduce(function(s,r){return s+(r.final||0)},0)/allAssessments.length) : 0;
  document.getElementById('stat-avg').textContent = avg;

  var today = new Date().toDateString();
  var todayCount = allAssessments.filter(function(r){return new Date(r.created_at).toDateString()===today}).length;
  document.getElementById('stat-today').textContent = todayCount;
}

// ═══════════════════════════════════════
// TABS
// ═══════════════════════════════════════
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});
  document.querySelectorAll('.tab-content').forEach(function(c){c.classList.remove('active')});
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('content-' + tab).classList.add('active');
}

// ═══════════════════════════════════════
// SEARCH
// ═══════════════════════════════════════
function filterLeads(q) {
  q = q.toLowerCase();
  var filtered = allLeads.filter(function(r){
    return (r.name||'').toLowerCase().includes(q) ||
           (r.phone||'').includes(q) ||
           (r.email||'').toLowerCase().includes(q);
  });
  renderLeads(filtered);
}

function filterAssess(q) {
  q = q.toLowerCase();
  var filtered = allAssessments.filter(function(r){
    return (r.name||'').toLowerCase().includes(q) ||
           (r.final||'').toString().includes(q);
  });
  renderAssessments(filtered);
}

// ═══════════════════════════════════════
// EXPORT CSV
// ═══════════════════════════════════════
function exportCurrent() {
  var data = currentTab === 'leads' ? allLeads : allAssessments;
  var filename = currentTab === 'leads' ? 'core-leads.csv' : 'core-assessments.csv';

  if (!data.length) { alert('لا توجد بيانات للتصدير'); return; }

  var headers = Object.keys(data[0]).join(',');
  var rows = data.map(function(row){
    return Object.values(row).map(function(v){
      var val = v === null ? '' : String(v);
      if (val.includes(',') || val.includes('"')) val = '"' + val.replace(/"/g, '""') + '"';
      return val;
    }).join(',');
  });

  var csv = '﻿' + headers + '\n' + rows.join('\n');
  var blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}
</script>
</body>
</html>
