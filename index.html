  body {

    background: #f8fafc;
    color: #1f2937;
    line-height: 1.6;
    min-height: 100vh;
  }
  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 20px 40px;
  }

  /* ===== HEADER WITH LARGE LOGO ===== */
  .header {
    text-align: center;
    padding: 40px 0 24px;
    background: linear-gradient(135deg, #0f172a 0%, #134e4a 50%, #0f766e 100%);
    border-radius: 0 0 24px 24px;
    margin-bottom: 32px;
  }
  .logo-container {
    margin-bottom: 20px;
  }
  .logo-container img {
    max-width: 320px;
    width: 100%;
    height: auto;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3));
  }
  .header h1 {
    font-size: 1.6rem;
    font-weight: 700;
    color: white;
    opacity: 0.9;
  }

  .intro-card {
    background: #ffffff;
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 24px;
    border: 1px solid #e5e7eb;
    box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
  }
  .intro-card h2 {
    color: #134e4a;
    font-size: 1.15rem;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .intro-card p {
    color: #4b5563;
    line-height: 2;
    font-size: 0.95rem;
    margin-bottom: 12px;
  }

  .assessments-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 20px;
    margin-bottom: 24px;
  }
  .assessment-box {
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    border: 2px solid #e5e7eb;
    box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
    text-decoration: none;
    color: inherit;
    display: block;
    transition: all 0.3s;
    height: 280px;
  }

    border-color: #14b8a6;
    box-shadow: 0 10px 25px -5px rgba(20,184,166,0.2);
    transform: translateY(-4px);
  }
