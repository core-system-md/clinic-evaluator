<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة الإدارة | Clinic Evaluator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      line-height: 1.6;
      min-height: 100vh;
    }
    .hidden { display: none !important; }

    /* Login Screen */
    .login-screen {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(135deg, #0d3d4d 0%, #0f172a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .login-box {
      background: #1e293b;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      border: 1px solid #334155;
    }
    .login-box h2 {
      color: #e8b923;
      text-align: center;
      margin-bottom: 8px;
      font-size: 1.6rem;
    }
    .login-box p {
      color: #94a3b8;
      text-align: center;
      margin-bottom: 32px;
      font-size: 0.95rem;
    }
    .login-box input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #334155;
      border-radius: 10px;
      background: #0f172a;
      color: #f1f5f9;
      font-size: 1rem;
      margin-bottom: 16px;
      font-family: inherit;
    }
    .login-box input:focus {
      outline: none;
      border-color: #2a8faf;
    }
    .login-error {
      color: #ef4444;
      text-align: center;
      margin-bottom: 16px;
      padding: 10px;
      background: rgba(239,68,68,0.1);
      border-radius: 8px;
      font-size: 0.9rem;
    }
    .btn-login {
      width: 100%;
      padding: 14px;
      background: #1a5f7a;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s;
    }
    .btn-login:hover { background: #2a8faf; }

    /* Dashboard */
    .admin-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }
    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      background: #1e293b;
      border-radius: 12px;
      margin-bottom: 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .logo { font-size: 1.3rem; font-weight: 700; color: #e8b923; }
    .header-actions { display: flex; align-items: center; gap: 12px; }
    .btn-icon {
      background: #334155;
      border: none;
      color: #f1f5f9;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1.1rem;
    }
    .btn-icon:hover { background: #1a5f7a; }
    #last-updated { color: #94a3b8; font-size: 0.85rem; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: #1e293b;
      border-radius: 12px;
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .stat-icon { font-size: 2rem; }
    .stat-value { font-size: 1.8rem; font-weight: 700; color: #e8b923; }
    .stat-label { color: #94a3b8; font-size: 0.9rem; }

    .settings-section, .table-section {
      background: #1e293b;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .settings-section h2 { margin-bottom: 16px; font-size: 1.1rem; }
    .settings-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 16px;
    }
    .setting-card {
      background: #0f172a;
      border-radius: 8px;
      padding: 16px;
      border: 1px solid #334155;
    }
    .setting-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .setting-title { font-weight: 600; }
    .toggle-switch {
      position: relative;
      width: 48px;
      height: 24px;
      background: #334155;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.3s;
    }
    .toggle-switch.active { background: #22c55e; }
    .toggle-switch::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      background: white;
      border-radius: 50%;
      top: 2px;
      right: 2px;
      transition: transform 0.3s;
    }
    .toggle-switch.active::after { transform: translateX(-24px); }
    .setting-status { font-size: 0.9rem; margin-bottom: 12px; }
    .users-list { margin-top: 12px; max-height: 200px; overflow-y: auto; }
    .user-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px;
      background: #1e293b;
      border-radius: 6px;
      margin-bottom: 6px;
      font-size: 0.85rem;
    }
    .user-info { color: #94a3b8; font-size: 0.8rem; }
    .btn-small {
      padding: 4px 10px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8rem;
    }
    .btn-add {
      background: #1a5f7a;
      color: white;
      margin-top: 8px;
      width: 100%;
      padding: 8px;
    }
    .btn-delete { background: #ef4444; color: white; }

    .filters-section {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 20px;
      align-items: center;
    }
    .search-box {
      display: flex;
      flex: 1;
      min-width: 280px;
      gap: 8px;
    }
    .search-box input {
      flex: 1;
      padding: 10px 16px;
      border: 1px solid #334155;
      border-radius: 8px;
      background: #1e293b;
      color: #f1f5f9;
      font-size: 0.95rem;
      font-family: inherit;
    }
    .search-box input:focus { outline: none; border-color: #2a8faf; }
    .search-box button {
      padding: 10px 16px;
      background: #1a5f7a;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    .filter-group { display: flex; gap: 8px; flex-wrap: wrap; }
    .filter-group select {
      padding: 10px 14px;
      border: 1px solid #334155;
      border-radius: 8px;
      background: #1e293b;
      color: #f1f5f9;
      cursor: pointer;
      font-family: inherit;
    }

    .table-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .table-header h3 { font-size: 1.1rem; }
    #results-count { color: #94a3b8; font-size: 0.9rem; }
    .table-wrapper { overflow-x: auto; }
    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }
    .data-table th {
      text-align: right;
      padding: 12px 16px;
      background: #0f172a;
      color: #94a3b8;
      font-weight: 600;
      font-size: 0.85rem;
      white-space: nowrap;
    }
    .data-table td {
      padding: 12px 16px;
      border-bottom: 1px solid #334155;
      white-space: nowrap;
    }
    .data-table tbody tr:hover { background: #334155; }
    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
    }
    .badge-success { background: rgba(34,197,94,0.15); color: #22c55e; }
    .badge-warning { background: rgba(245,158,11,0.15); color: #f59e0b; }
    .btn-details {
      padding: 6px 14px;
      background: #1a5f7a;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
    }
    .btn-details:hover { background: #2a8faf; }

    .pagination {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 20px;
    }
    .pagination button {
      padding: 8px 14px;
      background: #0f172a;
      color: #f1f5f9;
      border: 1px solid #334155;
      border-radius: 6px;
      cursor: pointer;
    }
    .pagination button.active { background: #1a5f7a; border-color: #1a5f7a; }
    .pagination button:disabled { opacity: 0.4; cursor: not-allowed; }

    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
    }
    .modal-overlay.hidden { display: none !important; }
    .modal-content {
      background: #1e293b;
      border-radius: 12px;
      width: 100%;
      max-width: 700px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 24px;
      border-bottom: 1px solid #334155;
    }
    .modal-header h3 { font-size: 1.1rem; }
    .btn-close {
      background: none;
      border: none;
      color: #94a3b8;
      font-size: 1.3rem;
      cursor: pointer;
    }
    .btn-close:hover { color: #f1f5f9; }
    .modal-body { padding: 24px; }

    .detail-section { margin-bottom: 20px; }
    .detail-section h4 {
      color: #e8b923;
      margin-bottom: 12px;
      font-size: 1rem;
    }
    .detail-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
    }
    .detail-item {
      background: #0f172a;
      padding: 12px;
      border-radius: 8px;
    }
    .detail-label { color: #94a3b8; font-size: 0.8rem; margin-bottom: 4px; }
    .detail-value { font-weight: 600; }
    .answers-list { display: flex; flex-direction: column; gap: 10px; }
    .answer-item {
      background: #0f172a;
      padding: 14px;
      border-radius: 8px;
      border-right: 3px solid #1a5f7a;
    }
    .answer-question { font-size: 0.9rem; margin-bottom:
